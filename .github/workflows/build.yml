name: Build Windows App

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-exe:
    name: Build EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: powershell
        run: cargo build --release

      - name: Prepare EXE artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\Vclipboard.exe dist\Vclipboard.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vclipboard-exe
          path: dist/Vclipboard.exe
          if-no-files-found: error

  build-installer:
    name: Build NSIS Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "C:\Program Files (x86)\NSIS\makensis.exe" /VERSION

      - name: Install cargo-packager
        shell: powershell
        run: cargo install cargo-packager --locked

      - name: Build installer
        shell: powershell
        run: cargo packager --release

      - name: Prepare installer artifact
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path target\release\bundle\nsis -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not generated."
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $installer.FullName dist\Vclipboard-setup.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vclipboard-installer
          path: dist/Vclipboard-setup.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-exe
      - build-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Vclipboard-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/Vclipboard.exe
            release-assets/Vclipboard-setup.exe
          generate_release_notes: true
